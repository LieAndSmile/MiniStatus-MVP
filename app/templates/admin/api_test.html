{% extends "base.html" %}

{% block header %}API key{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-light-card dark:bg-dark-card rounded-xl shadow-lg p-6 border border-light-border dark:border-dark-border">
    <h2 class="text-xl font-semibold text-light-text dark:text-dark-text mb-2">Environment API key</h2>
    <p class="text-sm text-light-muted dark:text-dark-muted mb-6">
      Value from <code class="text-xs">API_KEY</code> in your <code class="text-xs">.env</code>. The legacy JSON status API was removed in Phase 5c (Tier 3); Polymarket routes use session login instead.
    </p>
    <div class="bg-light-bg dark:bg-dark-bg rounded-lg p-4 border border-light-border dark:border-dark-border">
      <label class="block text-sm font-medium text-light-text dark:text-dark-text mb-2">API key</label>
      <div class="flex items-center gap-2">
        <input type="text"
               id="api-key"
               value="{{ api_key }}"
               readonly
               class="flex-1 px-3 py-2 bg-light-card dark:bg-dark-card border border-light-border dark:border-dark-border rounded-lg text-light-text dark:text-dark-text font-mono text-sm">
        <button type="button" onclick="navigator.clipboard.writeText(document.getElementById('api-key').value)"
                class="px-4 py-2 bg-light-primary dark:bg-dark-primary text-white rounded-lg hover:opacity-90 text-sm">
          Copy
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
