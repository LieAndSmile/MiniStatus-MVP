{% macro render(endpoint, current_days, extra_params=None, scroll_anchor='') %}
{% set extra = extra_params or {} %}
<div class="flex items-center gap-2">
  <span class="text-sm font-medium text-light-muted dark:text-dark-muted">Time window:</span>
  <a href="{{ url_for(endpoint, days='all', **extra) }}{{ scroll_anchor }}"
     class="polymarket-preserve-scroll px-3 py-1.5 rounded-md text-sm {% if current_days == 'all' %}bg-light-primary dark:bg-dark-primary text-white{% else %}text-light-muted dark:text-dark-muted hover:bg-light-hover dark:hover:bg-dark-hover{% endif %} transition-colors">All time</a>
  <a href="{{ url_for(endpoint, days='30', **extra) }}{{ scroll_anchor }}"
     class="polymarket-preserve-scroll px-3 py-1.5 rounded-md text-sm {% if current_days == '30' %}bg-light-primary dark:bg-dark-primary text-white{% else %}text-light-muted dark:text-dark-muted hover:bg-light-hover dark:hover:bg-dark-hover{% endif %} transition-colors">Last 30 days</a>
  <a href="{{ url_for(endpoint, days='90', **extra) }}{{ scroll_anchor }}"
     class="polymarket-preserve-scroll px-3 py-1.5 rounded-md text-sm {% if current_days == '90' %}bg-light-primary dark:bg-dark-primary text-white{% else %}text-light-muted dark:text-dark-muted hover:bg-light-hover dark:hover:bg-dark-hover{% endif %} transition-colors">Last 90 days</a>
  <a href="{{ url_for(endpoint, days='180', **extra) }}{{ scroll_anchor }}"
     class="polymarket-preserve-scroll px-3 py-1.5 rounded-md text-sm {% if current_days == '180' %}bg-light-primary dark:bg-dark-primary text-white{% else %}text-light-muted dark:text-dark-muted hover:bg-light-hover dark:hover:bg-dark-hover{% endif %} transition-colors">Last 180 days</a>
</div>
{% endmacro %}
